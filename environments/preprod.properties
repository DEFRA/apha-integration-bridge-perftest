# Self-contained preprod template

# test.duration.seconds is the steady-state window after ramp-up; setup time is separate.
test.mode=boundary
environment.name=preprod
results.jtl=results/preprod-boundary.jtl

threads.max=50
ramp_up.seconds=60
test.duration.seconds=600
startup.delay.seconds=0
target.total.rps=25
target.burst.requests=50

throughput.weight.locations_find=1
throughput.weight.workorders=1
throughput.weight.workorders_find=1
throughput.weight.customers_find=1
throughput.weight.organisations_find=1

http.connect.timeout.ms=10000
http.response.timeout.ms=10000
request.max.duration.ms=10000

header.accept=application/json
header.content_type_json=application/json
header.content_type_form=application/x-www-form-urlencoded
header.user_agent=APHA-Integration-Bridge-JMeter-Boundary

api.protocol=https
api.host=REPLACE_WITH_PREPROD_API_HOST
api.port=

auth.mode=client_credentials
auth.protocol=https
auth.host=REPLACE_WITH_PREPROD_AUTH_HOST
auth.port=
auth.token.path=/oauth2/token
auth.client_id=REPLACE_WITH_PREPROD_CLIENT_ID
auth.client_secret=REPLACE_WITH_PREPROD_SECRET
auth.bearer_token=

endpoint.locations_find.path=/locations/find
endpoint.workorders.path=/workorders
endpoint.workorders_find.path=/workorders/find
endpoint.customers_find.path=/customers/find
endpoint.organisations_find.path=/organisations/find

endpoint.locations_find.ids.json=["REPLACE_WITH_VALID_LOCATION_ID_1","REPLACE_WITH_VALID_LOCATION_ID_2"]
endpoint.locations_find.page=1
endpoint.locations_find.page_size=50

endpoint.workorders.page=1
endpoint.workorders.page_size=10
endpoint.workorders.start_activation_date=2022-02-18T09:54:09.778Z
endpoint.workorders.end_activation_date=2026-02-18T09:54:09.778Z
endpoint.workorders.country=SCOTLAND

endpoint.workorders_find.ids.json=["REPLACE_WITH_VALID_WORKORDER_ID_1","REPLACE_WITH_VALID_WORKORDER_ID_2"]

endpoint.customers_find.ids.json=["REPLACE_WITH_VALID_CUSTOMER_ID_1"]
endpoint.customers_find.page=1
endpoint.customers_find.page_size=50

endpoint.organisations_find.ids.json=["REPLACE_WITH_VALID_ORGANISATION_ID_1"]
