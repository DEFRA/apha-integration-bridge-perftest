# APHA Integration Bridge JMeter boundary test sample properties
# Copy this file per environment, then override with -J... in CI/CD when needed.

# Environment and results
environment.name=dev
results.jtl=results/apha-integration-bridge-boundary.jtl

# Safe-load execution settings
# Defaults reflect the agreed boundary limit: 25 RPS steady-state with burst support up to 50 requests.
# test.duration.seconds is the steady-state window after ramp-up; setup time is separate.
test.mode=boundary
threads.max=50
ramp_up.seconds=60
test.duration.seconds=600
startup.delay.seconds=0
target.total.rps=25
target.burst.requests=50

# Traffic mix across the 5 requests.
# Per-endpoint RPS is calculated as: target.total.rps * weight / sum(all weights)
throughput.weight.locations_find=1
throughput.weight.workorders=1
throughput.weight.workorders_find=1
throughput.weight.customers_find=1
throughput.weight.organisations_find=1

# HTTP settings
http.connect.timeout.ms=10000
http.response.timeout.ms=10000
request.max.duration.ms=10000

# Common headers
header.accept=application/json
header.content_type_json=application/json
header.content_type_form=application/x-www-form-urlencoded
header.user_agent=APHA-Integration-Bridge-JMeter-Boundary

# API target
# Dev defaults come from the repository config; override for test/preprod as needed.
api.protocol=https
api.host=apha-integration-bridge.api.dev.cdp-int.defra.cloud
api.port=

# Authentication
# auth.mode=client_credentials or bearer_token
auth.mode=client_credentials
auth.protocol=https
auth.host=apha-integration-bridge-c63f2.auth.eu-west-2.amazoncognito.com
auth.port=
auth.token.path=/oauth2/token
auth.client_id=dg3it83s68d6simi56d4eosi8
auth.client_secret=REPLACE_WITH_ENV_SECRET
auth.bearer_token=

# Endpoint paths
endpoint.locations_find.path=/locations/find
endpoint.workorders.path=/workorders
endpoint.workorders_find.path=/workorders/find
endpoint.customers_find.path=/customers/find
endpoint.organisations_find.path=/organisations/find

# Endpoint-specific path/query/body values
# Replace any value that is not valid in the target environment.
endpoint.locations_find.ids.json=["L1007035","L1007042"]
endpoint.locations_find.page=1
endpoint.locations_find.page_size=50

endpoint.workorders.page=1
endpoint.workorders.page_size=10
endpoint.workorders.start_activation_date=2022-02-18T09:54:09.778Z
endpoint.workorders.end_activation_date=2026-02-18T09:54:09.778Z
endpoint.workorders.country=SCOTLAND

endpoint.workorders_find.ids.json=["WS-76653","WS-75560"]

endpoint.customers_find.ids.json=["C153056"]
endpoint.customers_find.page=1
endpoint.customers_find.page_size=50

