# APHA Integration Bridge JMeter boundary test sample properties
# This repo is perf-test only; override with -J... when needed.

# Environment and results
environment.name=perf-test
results.jtl=results/perf-test-boundary.jtl

# Safe-load execution settings
# Defaults reflect the agreed low-volume profile from the performance test discussion:
# 5 GET /workorders requests over 5 minutes, and 15 requests over 5 minutes for each active POST endpoint.
# test.duration.seconds is the steady-state window after ramp-up; setup time is separate.
test.mode=boundary
threads.max=50
threads.per_endpoint=1
ramp_up.seconds=0
test.duration.seconds=300
startup.delay.seconds=0
target.total.rps=0.1667
target.burst.requests=50

# Traffic mix across the active requests.
# Per-endpoint RPS is calculated as: target.total.rps * weight / sum(all weights)
throughput.weight.locations_find=3
throughput.weight.workorders=1
throughput.weight.workorders_find=3
throughput.weight.customers_find=3
throughput.weight.organisations_find=3

# HTTP settings
http.connect.timeout.ms=10000
http.response.timeout.ms=10000
request.max.duration.ms=10000

# Common headers
header.accept=application/json
header.content_type_json=application/json
header.content_type_form=application/x-www-form-urlencoded
header.user_agent=APHA-Integration-Bridge-JMeter-Boundary

# API target
api.protocol=https
api.host=apha-integration-bridge.api.perf-test.cdp-int.defra.cloud
api.port=

# Authentication
# auth.mode=client_credentials or bearer_token
auth.mode=client_credentials
auth.protocol=https
auth.host=apha-integration-bridge-05244.auth.eu-west-2.amazoncognito.com
auth.port=
auth.token.path=/oauth2/token
auth.connect.timeout.ms=30000
auth.response.timeout.ms=30000
auth.request.retries=3
auth.retry.delay.ms=2000
auth.debug=false
auth.client_id=49m7soe26q8ugh80sv31fp6g8g
auth.client_secret=REPLACE_WITH_PERF_SECRET
auth.bearer_token=

# Endpoint paths
endpoint.locations_find.path=/locations/find
endpoint.workorders.path=/workorders
endpoint.workorders_find.path=/workorders/find
endpoint.customers_find.path=/customers/find
endpoint.organisations_find.path=/organisations/find

